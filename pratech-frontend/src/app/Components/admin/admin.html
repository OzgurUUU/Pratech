<div class="bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden">
  <div class="p-6 lg:p-8 flex justify-between items-center border-b border-slate-800">
    <div>
      <h2 class="text-2xl font-bold text-white tracking-tight">Talep Yönetimi</h2>
    </div>
    <div class="bg-slate-950 px-4 py-2 rounded-lg border border-slate-800">
      <span class="text-indigo-400 font-bold">{{leaves.length}}</span> <span class="text-slate-500 text-sm">Talep</span>
    </div>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead class="bg-slate-950/50 text-slate-400 uppercase text-xs tracking-widest">
        <tr>
          <th class="p-5 font-semibold">Personel</th>
          <th class="p-5 font-semibold">Tür</th>
          <th class="p-5 font-semibold">Tarih</th>
          <th class="p-5 font-semibold">Durum</th>
          <th class="p-5 font-semibold text-right">Aksiyonlar</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-800/50">
        <tr *ngFor="let leave of leaves" class="hover:bg-slate-800/40 transition-colors group">
          <td class="p-5 text-white font-medium">{{ leave.fullName }}</td>
          <td class="p-5 text-slate-300">{{ leave.leaveType }}</td>
          <td class="p-5 text-slate-400 text-sm">
            {{ leave.startDate | date:'dd MMM' }} - {{ leave.endDate | date:'dd MMM' }}
          </td>
          <td class="p-5">
            <span [ngClass]="{
              'bg-amber-500/10 text-amber-400 border-amber-500/20': leave.status === 'Pending',
              'bg-emerald-500/10 text-emerald-400 border-emerald-500/20': leave.status === 'Onaylandı',
              'bg-rose-500/10 text-rose-400 border-rose-500/20': leave.status === 'Reddedildi'
            }" class="px-3 py-1 rounded-full text-xs font-bold border flex items-center w-max gap-1.5">
              <span class="w-1.5 h-1.5 rounded-full" [ngClass]="{'bg-amber-400': leave.status === 'Pending', 'bg-emerald-400': leave.status === 'Onaylandı', 'bg-rose-400': leave.status === 'Reddedildi'}"></span>
              {{ leave.status }}
            </span>
          </td>
          <td class="p-5 text-right flex justify-end gap-2">
            <button type="button" *ngIf="leave.status === 'Beklemede'" (click)="updateStatus(leave.id!, 'Onaylandı')" class="px-3 py-1.5 bg-emerald-500/10 text-emerald-500 hover:bg-emerald-500 hover:text-white rounded-lg text-sm font-medium transition-all border border-emerald-500/20">Onayla</button>
            <button type="button" *ngIf="leave.status === 'Beklemede'" (click)="updateStatus(leave.id!, 'Reddedildi')" class="px-3 py-1.5 bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white rounded-lg text-sm font-medium transition-all border border-rose-500/20">Reddet</button>
            
            <button type="button" (click)="onDelete(leave.id!)" class="p-1.5 text-slate-500 hover:text-rose-400 hover:bg-slate-800 rounded-lg transition-all ml-2" title="Talebi Sil">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
