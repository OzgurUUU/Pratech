<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded shadow">
  <h2 class="text-xl font-bold mb-4">Yeni İzin Talebi</h2>
  
  <form [formGroup]="leaveForm" (ngSubmit)="onSubmit()">
    <div class="mb-4">
      <label class="block text-sm font-medium">Ad Soyad</label>
      <input formControlName="fullName" type="text" class="mt-1 block w-full border rounded p-2">
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium">İzin Türü</label>
      <select formControlName="leaveType" class="mt-1 block w-full border rounded p-2">
        <option>Yıllık İzin</option>
        <option>Sağlık İzni</option>
        <option>Mazeret</option>
      </select>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-sm font-medium">Başlangıç</label>
        <input formControlName="startDate" type="date" class="mt-1 block w-full border rounded p-2">
      </div>
      <div>
        <label class="block text-sm font-medium">Bitiş</label>
        <input formControlName="endDate" type="date" class="mt-1 block w-full border rounded p-2">
      </div>
    </div>
    
    <div *ngIf="leaveForm.hasError('invalidDate') && submitted" class="text-red-500 text-sm mb-4">
      Başlangıç tarihi bitiş tarihinden sonra olamaz!
    </div>

    <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Talep Et</button>
  </form>
</div>
