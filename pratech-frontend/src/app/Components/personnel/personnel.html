<div
  class="bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-6 lg:p-8">
  <div class="flex items-center gap-3 mb-8 border-b border-slate-800 pb-4">
    <div class="p-3 bg-indigo-500/10 text-indigo-400 rounded-xl">
      <svg class="w-6 h-6" fill="none" stroke="currentColor"
        viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round"
          stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
    </div>
    <h2 class="text-2xl font-bold text-white">Yeni Talep</h2>
  </div>

  <form [formGroup]="leaveForm" (ngSubmit)="onSubmit()" class="space-y-5">
    <div>
      <label class="block text-sm font-semibold text-slate-400 mb-2">Ad
        Soyad</label>
      <input formControlName="fullName" type="text"
        [ngClass]="{'border-rose-500 focus:ring-rose-500': submitted && leaveForm.get('fullName')?.invalid}"
        class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder-slate-600">
      <span *ngIf="submitted && leaveForm.get('fullName')?.invalid"
        class="text-rose-500 text-xs mt-1.5 ml-1 block font-medium">
        Lütfen ad soyad giriniz.
      </span>
    </div>

    <div>
      <label class="block text-sm font-semibold text-slate-400 mb-2">İzin
        Türü</label>
      <select formControlName="leaveType"
        [ngClass]="{'border-rose-500 focus:ring-rose-500': submitted && leaveForm.get('leaveType')?.invalid}"
        class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        <option>Yıllık İzin</option>
        <option>Sağlık İzni</option>
        <option>Mazeret</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-semibold text-slate-400 mb-2">Açıklama</label>
      <input formControlName="description" type="text"
        [ngClass]="{'border-rose-500 focus:ring-rose-500': submitted && leaveForm.get('description')?.invalid}"
        class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder-slate-600">
      <span *ngIf="submitted && leaveForm.get('description')?.invalid"
        class="text-rose-500 text-xs mt-1.5 ml-1 block font-medium">
        Lütfen açıklama giriniz.
      </span>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label
          class="block text-sm font-semibold text-slate-400 mb-2">Başlangıç</label>
        <input formControlName="startDate" type="date"
          [ngClass]="{'border-rose-500 focus:ring-rose-500': submitted && leaveForm.get('startDate')?.invalid}"
          class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all [color-scheme:dark]">
        <span *ngIf="submitted && leaveForm.get('startDate')?.invalid"
          class="text-rose-500 text-xs mt-1.5 ml-1 block font-medium">Lütfen
          tarih seçiniz.</span>
      </div>
      <div>
        <label
          class="block text-sm font-semibold text-slate-400 mb-2">Bitiş</label>
        <input formControlName="endDate" type="date"
          [ngClass]="{'border-rose-500 focus:ring-rose-500': submitted && leaveForm.get('endDate')?.invalid}"
          class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all [color-scheme:dark]">
        <span *ngIf="submitted && leaveForm.get('endDate')?.invalid"
          class="text-rose-500 text-xs mt-1.5 ml-1 block font-medium">Lütfen
          tarih seçiniz.</span>
      </div>
    </div>

    <div *ngIf="leaveForm.hasError('invalidDate') && submitted"
      class="flex items-center gap-2 p-3 bg-rose-500/10 text-rose-400 rounded-lg text-sm border border-rose-500/20">
      <svg class="w-5 h-5" fill="none" stroke="currentColor"
        viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round"
          stroke-width="2"
          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      Başlangıç tarihi, bitiş tarihinden sonra olamaz!
    </div>

    <button type="submit"
      class="w-full mt-6 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_0_15px_rgba(79,70,229,0.3)] transition-all active:scale-[0.98]">
      Talebi İlet
    </button>
  </form>
  <div *ngIf="showToast"
    class="fixed top-24 right-8 z-50 flex items-center gap-4 bg-indigo-600 text-white px-6 py-4 rounded-2xl shadow-[0_0_20px_rgba(79,70,229,0.4)] border border-indigo-400 transition-all duration-500 ease-out transform translate-y-0 opacity-100">

    <div class="bg-white/20 p-2.5 rounded-xl animate-bounce">
      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor"
        viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round"
          stroke-width="2"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
    </div>

    <div>
      <h4 class="font-bold text-base tracking-wide">Talep Gönderildi!</h4>
      <p class="text-xs text-indigo-100 mt-0.5">Talebiniz başarıyla
        gönderildi.</p>
    </div>

    <button (click)="showToast = false"
      class="ml-4 text-indigo-200 hover:text-white transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor"
        viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round"
          stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
  </div>

  <div
    class="bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden...">
  </div>
