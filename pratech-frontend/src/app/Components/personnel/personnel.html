<div class="bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-6 lg:p-8">
  <div class="flex items-center gap-3 mb-8 border-b border-slate-800 pb-4">
    <div class="p-3 bg-indigo-500/10 text-indigo-400 rounded-xl">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
    </div>
    <h2 class="text-2xl font-bold text-white">Yeni Talep</h2>
  </div>
  
  <form [formGroup]="leaveForm" (ngSubmit)="onSubmit()" class="space-y-5">
    <div>
  <label class="block text-sm font-semibold text-slate-400 mb-2">Ad Soyad</label>
  <input formControlName="fullName" type="text" 
    [ngClass]="{'border-rose-500 focus:ring-rose-500': submitted && leaveForm.get('fullName')?.invalid}"
    class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder-slate-600">
  <span *ngIf="submitted && leaveForm.get('fullName')?.invalid" class="text-rose-500 text-xs mt-1.5 ml-1 block font-medium">
    Lütfen ad soyad giriniz.
  </span>
</div>

<div>
  <label class="block text-sm font-semibold text-slate-400 mb-2">İzin Türü</label>
  <select formControlName="leaveType" 
    [ngClass]="{'border-rose-500 focus:ring-rose-500': submitted && leaveForm.get('leaveType')?.invalid}"
    class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
    <option>Yıllık İzin</option>
    <option>Sağlık İzni</option>
    <option>Mazeret</option>
  </select>
</div>

<div class="grid grid-cols-2 gap-4">
  <div>
    <label class="block text-sm font-semibold text-slate-400 mb-2">Başlangıç</label>
    <input formControlName="startDate" type="date" 
      [ngClass]="{'border-rose-500 focus:ring-rose-500': submitted && leaveForm.get('startDate')?.invalid}"
      class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all [color-scheme:dark]">
    <span *ngIf="submitted && leaveForm.get('startDate')?.invalid" class="text-rose-500 text-xs mt-1.5 ml-1 block font-medium">Lütfen tarih seçiniz.</span>
  </div>
  <div>
    <label class="block text-sm font-semibold text-slate-400 mb-2">Bitiş</label>
    <input formControlName="endDate" type="date" 
      [ngClass]="{'border-rose-500 focus:ring-rose-500': submitted && leaveForm.get('endDate')?.invalid}"
      class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all [color-scheme:dark]">
    <span *ngIf="submitted && leaveForm.get('endDate')?.invalid" class="text-rose-500 text-xs mt-1.5 ml-1 block font-medium">Lütfen tarih seçiniz.</span>
  </div>
</div>

<div *ngIf="leaveForm.hasError('invalidDate') && submitted" class="flex items-center gap-2 p-3 bg-rose-500/10 text-rose-400 rounded-lg text-sm border border-rose-500/20">
  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
  Başlangıç tarihi, bitiş tarihinden sonra olamaz!
</div>

    <button type="submit" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_0_15px_rgba(79,70,229,0.3)] transition-all active:scale-[0.98]">
      Talebi İlet
    </button>
  </form>
</div>
